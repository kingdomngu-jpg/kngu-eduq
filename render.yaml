services:
  - name: gestioschool
    type: web
    env: node
    # ensure devDependencies (vite) are installed even in production environment
    buildCommand: rm -rf node_modules && NPM_CONFIG_PRODUCTION=false npm install && npm run build
    startCommand: npm run start
    plan: free
    envVars:
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        value: mailto:admin@nomade-corp.com
      - key: VITE_VAPID_PUBLIC_KEY
        sync: false

